<!DOCTYPE html>
<html lang="ru">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Наращивание ресниц</title>
    <style>
        body { font-family: 'Arial', sans-serif; margin: 0; padding: 0; background-color: #faf6f0; color: #333; text-align: center; }
        .container { max-width: 600px; margin: 0 auto; padding: 20px; }
        img { width: 100%; max-height: 300px; object-fit: cover; border-radius: 15px; margin-top: 15px; }
        h1 { font-size: 28px; margin-bottom: 5px; color: #4a3b32; }
        p { font-size: 16px; color: #7a6b62; }
        .price-list { background: white; padding: 20px; border-radius: 15px; text-align: left; margin: 20px 0; box-shadow: 0 4px 10px rgba(0,0,0,0.05); }
        .price-item { display: flex; justify-content: space-between; margin-bottom: 12px; font-size: 16px; border-bottom: 1px dashed #e0d5cb; padding-bottom: 5px; }
        .btn { display: block; background-color: #25d366; color: white; text-decoration: none; padding: 15px; border-radius: 30px; font-size: 18px; font-weight: bold; margin-top: 25px; box-shadow: 0 4px 15px rgba(37, 211, 102, 0.3); }
        .btn:hover { background-color: #20ba59; }
    </style>
</head>
<body>
    <div class="container">
        <!-- Красивая эстетичная картинка ресниц из интернета -->
        <img src="https://images.unsplash.com/photo-1583001931096-959e9a1a6223?auto=format&fit=crop&w=600&q=80" alt="Ресницы">
        
        <h1>Наращивание ресниц</h1>
        <p>Идеальный взгляд. Запись за 1 минуту 👇</p>

        <div class="price-list">
            <div class="price-item"><span>Классика</span> <strong>3 990 ₸</strong></div>
            <div class="price-item"><span>Объем 2D</span> <strong>5 990 ₸</strong></div>
            <div class="price-item"><span>Объем 3D</span> <strong>7 990 ₸</strong></div>
            <div class="price-item"><span>Снятие чужой работы</span> <strong>1 500 ₸</strong></div>
        </div>

        <!-- ЗАМЕНИ НОМЕР 77001234567 НА СВОЙ -->
      <a href="https://wa.me/77781143859?text=Здравствуйте!%20Хочу%20записаться%20на%20ресницы" class="btn" target="_blank">
            Записаться через WhatsApp
        </a>
    </div>
</body>
</html>
