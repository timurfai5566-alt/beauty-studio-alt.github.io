<!DOCTYPE html>
<html lang="ru">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Lash Beauty Studio | Наращивание ресниц</title>
    <style>
        * { box-sizing: border-box; }
        body { 
            font-family: '-apple-system', BlinkMacSystemFont, 'Segoe UI', Roboto, Arial, sans-serif; 
            margin: 0; 
            padding: 0; 
            /* Подключаем твое темное атмосферное фото на фон */
            background: url('фон для сайта.jpg') no-repeat center center fixed;
            background-size: cover;
            color: #ffffff; 
            min-height: 100vh;
            display: flex;
            flex-direction: column;
            align-items: center;
        }

        /* Шапка сайта (Навигация) как на макете */
        header {
            width: 100%;
            max-width: 1200px;
            padding: 20px 40px;
            display: flex;
            justify-content: space-between;
            align-items: center;
            background: rgba(0, 0, 0, 0.4);
            backdrop-filter: blur(10px);
            border-bottom: 1px solid rgba(255, 255, 255, 0.1);
            position: fixed;
            top: 0;
            z-index: 100;
        }
        .logo {
            font-size: 22px;
            font-weight: 700;
            letter-spacing: 0.5px;
            display: flex;
            align-items: center;
            gap: 8px;
        }
        .logo span { color: #e0659f; }
        nav { display: flex; gap: 30px; }
        nav a { color: rgba(255, 255, 255, 0.8); text-decoration: none; font-size: 14px; transition: 0.3s; }
        nav a:hover { color: #ffffff; }
        .header-btn {
            background: #e0659f;
            color: white;
            text-decoration: none;
            padding: 10px 22px;
            border-radius: 20px;
            font-size: 14px;
            font-weight: 600;
            transition: 0.3s;
        }
        .header-btn:hover { background: #c44f85; }

        /* Главный баннер (Hero-блок) */
        .hero {
            margin-top: 140px;
            width: 100%;
            max-width: 800px;
            padding: 40px 30px;
            text-align: center;
            background: rgba(20, 20, 20, 0.65);
            backdrop-filter: blur(15px);
            border: 1px solid rgba(255, 255, 255, 0.1);
            border-radius: 32px;
            box-shadow: 0 20px 50px rgba(0,0,0,0.5);
        }
