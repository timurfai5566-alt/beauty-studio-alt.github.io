<!DOCTYPE html>
<html lang="ru">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Lash Studio | Наращивание ресниц</title>
    <style>
        body { 
            font-family: '-apple-system', BlinkMacSystemFont, 'Segoe UI', Roboto, Arial, sans-serif; 
            margin: 0; 
            padding: 0; 
            background: #fdfbf7; 
            color: #2c2520; 
            display: flex;
            justify-content: center;
        }
        .container { 
            max-width: 480px; 
            width: 100%;
            padding: 24px; 
            box-sizing: border-box;
        }
        .hero-img { 
            width: 100%; 
            height: 280px; 
            object-fit: cover; 
            border-radius: 24px; 
            box-shadow: 0 8px 24px rgba(74, 59, 50, 0.06);
        }
        h1 { 
            font-size: 26px; 
            font-weight: 600;
            margin: 20px 0 6px 0; 
            color: #3d312a; 
            text-align: center;
        }
        .subtitle { 
            font-size: 15px; 
            color: #8a7a71; 
            text-align: center; 
            margin-bottom: 24px;
        }
        .price-card { 
            background: #ffffff; 
            padding: 16px 20px; 
            border-radius: 16px; 
            display: flex; 
            justify-content: space-between; 
            align-items: center;
            margin-bottom: 12px; 
            box-shadow: 0 4px 12px rgba(74, 59, 50, 0.03);
            border: 1px solid rgba(224, 213, 203, 0.4);
        }
        .name { font-weight: 500; font-size: 16px; }
        .price-value { 
            font-weight: 600; 
            font-size: 16px; 
            color: #4a3b32;
            background: #f7f4f0;
            padding: 6px 12px;
            border-radius: 10px;
        }
        .btn-booking { 
            display: block; 
            background: #4a3b32; 
            color: #ffffff; 
            text-decoration: none; 
            text-align: center;
            padding: 16px; 
            border-radius: 16px; 
            font-size: 16px; 
            font-weight: 600; 
            margin-top: 24px; 
            box-shadow: 0 6px 20px rgba(74, 59, 50, 0.15);
            border: none;
            width: 100%;
            cursor: pointer;
        }
    </style>
</head>
<body>
    <div class="container">
        <!-- Настоящая эстетичная картинка ресниц -->
        <img class="hero-img" src="https://images.unsplash.com/photo-1512496015851-a90fb38ba796?auto=format&fit=crop&w=600&q=80" alt="Lashes">
        
        <h1>Наращивание ресниц</h1>
        <p class="subtitle">Выбери удобное время для записи 👇</p>

        <div class="price-section">
            <div class="price-card">
                <div class="name">Классика</div>
                <div class="price-value">3 990 ₸</div>
            </div>
            <div class="price-card">
                <div class="name">Объем 2D</div>
                <div class="price-value">6 990 ₸</div>
            </div>
            <div class="price-card">
                <div class="name">Объем 3D</div>
                <div class="price-value">7 990 ₸</div>
            </div>
            <div class="price-card">
                <div class="name">Снятие чужой работы</div>
                <div class="price-value">1 500 ₸</div>
            </div>
        </div>

        <!-- КНОПКА ЗАПИСИ С КАЛЕНДАРЕМ -->
        <a href="ВСТАВЬ_СЮДА_ССЫЛКУ_ИЗ_DIKIDI" class="btn-booking" target="_blank">
            Выбрать дату и время записи
        </a>
    </div>
</body>
</html>
